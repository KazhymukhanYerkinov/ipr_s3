name: ipr_s3
description: "File Secure App — encrypted local file storage for photos, documents, and PDFs."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Localization
  intl: any

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Secure token storage
  flutter_secure_storage: ^10.0.0

  # Encrypted local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2

  # State management
  flutter_bloc: ^9.1.1

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Routing
  auto_route: ^9.2.0

  # Secure logging
  logger: ^2.5.0

  # Cryptography
  crypto: ^3.0.6
  encrypt: ^5.0.3

  # Biometric authentication
  local_auth: ^2.3.0

  # File handling
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  uuid: ^4.5.1

  # Image processing
  image: ^4.3.0

  # FFI — calling native C functions from Dart
  ffi: ^2.1.3
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

  # Code generators
  freezed: ^2.4.5
  json_serializable: ^6.7.0
  injectable_generator: ^2.4.1
  auto_route_generator: ^9.0.0

  flutter_lints: ^5.0.0
  intl_utils: ^2.8.8

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true

flutter_intl:
  enabled: true
  class_name: GeneratedLocalization
  main_locale: en
  arb_dir: lib/core/localization/l10n
  output_dir: lib/core/localization/generated
  use_deferred_loading: false
